<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adaptive MoE Demand Forecasting Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0f1410;
      --panel: #161d17;
      --panel-border: #2a3329;
      --ink: #e8ede5;
      --ink-dim: #8fa088;
      --mono: 'IBM Plex Mono', 'SF Mono', Menlo, monospace;
      --sans: 'Inter', -apple-system, sans-serif;
      --green: #4ade80;
      --green-dim: #1a3324;
      --yellow: #facc15;
      --yellow-dim: #332b14;
      --red: #f87171;
      --red-dim: #331818;
      --accent: #7dd3a8;
    }
    #dashboard-root {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      padding: 28px;
      border-radius: 4px;
      max-width: 1180px;
      margin: 0 auto;
    }
    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 16px;
      margin-bottom: 20px;
    }
    .dash-title {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
    }
    .dash-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--ink-dim);
    }
    .main-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 4px;
      padding: 20px;
    }
    .panel-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--ink-dim);
      margin-bottom: 16px;
    }
    .chart-container {
      position: relative;
      height: 280px;
      width: 100%;
    }
    .weights-container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 10px;
    }
    .weight-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .weight-labels {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 12px;
    }
    .bar-bg {
      background: var(--bg);
      border: 1px solid var(--panel-border);
      height: 12px;
      border-radius: 2px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      transition: width 0.15s ease-out;
    }
    .zone-strip {
      height: 4px;
      border-radius: 2px;
      margin-bottom: 16px;
    }
    .zone-GREEN { background: var(--green); }
    .zone-YELLOW { background: var(--yellow); }
    .zone-RED { background: var(--red); }
    
    .status-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      margin-bottom: 12px;
    }
    .status-GREEN { color: var(--green); background: var(--green-dim); border: 1px solid #22543d; }
    .status-YELLOW { color: var(--yellow); background: var(--yellow-dim); border: 1px solid #744210; }
    .status-RED { color: var(--red); background: var(--red-dim); border: 1px solid #742a2a; }

    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .metric-card {
      background: var(--bg);
      border: 1px solid var(--panel-border);
      padding: 12px;
      border-radius: 4px;
    }
    .metric-label {
      font-size: 11px;
      color: var(--ink-dim);
      margin-bottom: 4px;
    }
    .metric-val {
      font-family: var(--mono);
      font-size: 16px;
      font-weight: 600;
    }
    .explanation-text {
      font-size: 13px;
      line-height: 1.5;
      color: var(--ink);
      border-left: 2px solid var(--panel-border);
      padding-left: 12px;
    }
    .timeline-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .scrubber-container {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--bg);
      padding: 12px 16px;
      border-radius: 4px;
      border: 1px solid var(--panel-border);
    }
    .scrubber {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }
    .scrubber-label {
      font-family: var(--mono);
      font-size: 12px;
      min-width: 90px;
      text-align: right;
    }
    .bottom-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 20px;
    }
    table.ablation {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      text-align: left;
    }
    table.ablation th, table.ablation td {
      padding: 8px;
      border-bottom: 1px solid var(--panel-border);
    }
    table.ablation th {
      font-weight: 600;
      color: var(--ink-dim);
    }
    table.ablation td {
      font-family: var(--mono);
    }
    table.ablation tr.best {
      color: var(--green);
      font-weight: 600;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--panel-border);
      padding-bottom: 8px;
    }
    .tab {
      background: none;
      border: none;
      color: var(--ink-dim);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 8px;
    }
    .tab.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }
    .note {
      font-size: 11px;
      color: var(--ink-dim);
      line-height: 1.4;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<div id=\"dashboard-root\"></div>

<script>

  const ABLATION = [

  const BUSINESS = [

    { d: 1915, date: "2016-04-26", actual: 12, pred_tree: 13.1, pred_seq: 14.9, fusion: 13.6, w_tree: 0.72, w_seq: 0.28, dri: 0.41, zone: "YELLOW", safety: 4.6, explanation: "An unexpected mid-week sales contraction triggers a localized structural volatility alert. The gating network dynamically reduces trust in sequential context and transitions allocation over to the LightGBM tree expert to capture rapid variance." },

  ];

  let dayIdx = 0;
  let chartInstance = null;
  let activeTab = "Stable";

  window.addEventListener('DOMContentLoaded', () => {
    initDashboardLayout();
    render();
  });

  function initDashboardLayout() {
    const root = document.getElementById('dashboard-root');
    root.innerHTML = `
      <div class="dash-header">
        <div class="dash-title">Adaptive Mixture-of-Experts Forecasting Engine</div>
        <div class="dash-meta">RELEASE: v2.0-PRODUCTION | EXPERTS: LIGHTGBM &amp; PYTORCH LSTM</div>
      </div>
      <div class="main-grid">
        <div class="panel">
          <div class="panel-title">Dynamic Forecasting &amp; Truth Trajectory</div>
          <div class="chart-container"><canvas id="mainChart"></canvas></div>
        </div>
        <div class="panel" id="gating-panel"></div>
      </div>
      <div class="panel timeline-panel">
        <div class="panel-title">Chronological Operational Simulation Hub</div>
        <div class="scrubber-container">
          <input type="range" class="scrubber" id="scrubber" min="0" max="${TIMELINE_DATA.length - 1}" value="0">
          <div class="scrubber-label" id="scrubber-text"></div>
        </div>
      </div>
      <div class="bottom-grid">
        <div class="panel" id="ablation-panel"></div>
        <div class="panel" id="business-panel"></div>
      </div>
    `;
  }

  function render() {
    const row = TIMELINE_DATA[dayIdx];
    document.getElementById('scrubber-text').innerText = `Day d_${row.d} (${row.date})`;
    
    renderChart(row);
    renderGatingPanel(row);
    renderAblationPanel();
    renderBusinessPanel();
  }

  function
